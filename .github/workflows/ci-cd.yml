name: C++ Enterprise CI/CD

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write
  actions: read

env:
  BUILD_DIR: build
  APP_NAME: equipo4

jobs:
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          queries: security-extended,security-and-quality

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Configure
        run: |
          cmake -S . -B $BUILD_DIR -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: |
          cmake --build $BUILD_DIR --parallel

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Configure
        run: |
          cmake -S . -B $BUILD_DIR -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: |
          cmake --build $BUILD_DIR --parallel

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ${{ env.BUILD_DIR }}/compile_commands.json

  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_ROOT_CERT: ${{ secrets.SONAR_ROOT_CERT }}

    steps:
      - name: Validate SonarQube secrets
        id: sonar-secrets
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "SonarQube secrets not configured. Job will finish without scan."
          else
            echo "enabled=true" >> $GITHUB_OUTPUT
            echo "SonarQube secrets detected."
          fi

      - name: Checkout
        if: steps.sonar-secrets.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        if: steps.sonar-secrets.outputs.enabled == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Download build artifacts
        if: steps.sonar-secrets.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ${{ env.BUILD_DIR }}

      - name: Verify compile_commands.json exists
        if: steps.sonar-secrets.outputs.enabled == 'true'
        run: |
          test -f $BUILD_DIR/compile_commands.json
          echo "compile_commands.json found"

      - name: SonarQube Scan
        if: steps.sonar-secrets.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          SONAR_ROOT_CERT: ${{ env.SONAR_ROOT_CERT }}
        with:
          args: >
            -Dsonar.projectKey=3nibbles
            -Dsonar.projectName=3nibbles
            -Dsonar.sources=.
            -Dsonar.exclusions=build/**,cmake-build-debug/**,.idea/**
            -Dsonar.cfamily.compile-commands=build/compile_commands.json
            -Dsonar.verbose=true
