name: C++ Enterprise CI/CD

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write
  actions: read

env:
  BUILD_DIR: build
  APP_NAME: equipo4

jobs:
  # ─── Seguridad estática ──────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          queries: security-extended,security-and-quality
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++
      - name: Configure
        run: |
          cmake -S . -B $BUILD_DIR -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Build
        run: cmake --build $BUILD_DIR --parallel
      - name: Analyze
        uses: github/codeql-action/analyze@v3

  # ─── Build + Tests + Coverage ────────────────────────────────────
  build-test:
    name: Build + Test + Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ gcovr
      - name: Configure with coverage
        run: |
          cmake -S . -B $BUILD_DIR -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"
      - name: Build
        run: cmake --build $BUILD_DIR --parallel
      - name: Run unit tests
        run: ctest --test-dir $BUILD_DIR -R unit --output-on-failure
      - name: Generate SonarQube coverage report
        run: |
          mkdir -p $BUILD_DIR/coverage
          gcovr \
            --root . \
            --filter src/ \
            --filter include/ \
            --exclude 'src/server\.cpp' \
            --exclude 'tests/.*' \
            --exclude '.*/_deps/.*' \
            --sonarqube $BUILD_DIR/coverage/sonarqube-coverage.xml
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            ${{ env.BUILD_DIR }}/compile_commands.json
            ${{ env.BUILD_DIR }}/coverage/sonarqube-coverage.xml

  # ─── SonarQube ───────────────────────────────────────────────────
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: [build-test]
    if: github.ref == 'refs/heads/main'
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_ROOT_CERT: ${{ secrets.SONAR_ROOT_CERT }}
    steps:
      - name: Validate SonarQube secrets
        id: sonar-secrets
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "enabled=false" >> $GITHUB_OUTPUT
          else
            echo "enabled=true" >> $GITHUB_OUTPUT
          fi
      - name: Checkout
        if: steps.sonar-secrets.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install dependencies
        if: steps.sonar-secrets.outputs.enabled == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++
      - name: Download build artifacts
        if: steps.sonar-secrets.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build-artifacts
      - name: Restore artifacts
        if: steps.sonar-secrets.outputs.enabled == 'true'
        run: |
          mkdir -p $BUILD_DIR/coverage
          COMPILE_CMD=$(find build-artifacts -name compile_commands.json | head -1 || true)
          COVERAGE_XML=$(find build-artifacts -name sonarqube-coverage.xml | head -1 || true)
          [ -n "$COMPILE_CMD" ] && cp "$COMPILE_CMD" "$BUILD_DIR/compile_commands.json"
          [ -n "$COVERAGE_XML" ] && cp "$COVERAGE_XML" "$BUILD_DIR/coverage/sonarqube-coverage.xml"
      - name: SonarQube Scan
        if: steps.sonar-secrets.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          SONAR_ROOT_CERT: ${{ env.SONAR_ROOT_CERT }}
        with:
          args: >
            -Dsonar.projectKey=3nibbles
            -Dsonar.projectName=3nibbles
            -Dsonar.sources=src,include
            -Dsonar.tests=tests
            -Dsonar.test.inclusions=tests/**/*.cpp
            -Dsonar.cfamily.compile-commands=build/compile_commands.json
            -Dsonar.coverageReportPaths=build/coverage/sonarqube-coverage.xml
            -Dsonar.exclusions=build/**,cmake-build-debug/**,.idea/**

  # ─── Package Release ─────────────────────────────────────────────
  package-release:
    name: Package Release
    runs-on: ubuntu-latest
    needs: [build-test, secret-scan, codeql]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++
      - name: Build Release binary
        run: |
          cmake -S . -B $BUILD_DIR -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build $BUILD_DIR --target server --parallel
          strip $BUILD_DIR/server
      - name: Upload server binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-release
          path: ${{ env.BUILD_DIR }}/server
          retention-days: 1
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Release build-${{ github.run_number }}"
          body: |
            Compilacion automatica del servidor Equipo 4.
            Commit: ${{ github.sha }}
          files: ${{ env.BUILD_DIR }}/server
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── DAST ────────────────────────────────────────────────────────
  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: [package-release]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: server-release
          path: ./bin
      - name: Start server
        run: |
          chmod +x ./bin/server
          ./bin/server &
          echo $! > server.pid
          sleep 5
          curl -sf http://localhost:8080/status || (echo "Server failed to start"; exit 1)
      - name: OWASP ZAP Baseline Scan
        run: |
          docker run --rm --network=host \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:8080 \
            -I \
            -j \
            -r zap-report.html || true
      - name: Stop server
        if: always()
        run: kill $(cat server.pid) || true

  # ─── Deploy to Ubuntu Server ─────────────────────────────────────
  deploy:
    name: Deploy to Ubuntu Server
    runs-on: ubuntu-latest
    needs: [sonarqube, dast]
    if: github.ref == 'refs/heads/main'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
    steps:
      - name: Validate deploy secrets
        id: deploy-secrets
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "Deploy secrets not configured. Skipping deploy."
          else
            echo "enabled=true" >> $GITHUB_OUTPUT
          fi
      - name: Checkout
        if: steps.deploy-secrets.outputs.enabled == 'true'
        uses: actions/checkout@v4
      - name: Download server binary
        if: steps.deploy-secrets.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: server-release
          path: ./bin
      - name: Setup SSH key
        if: steps.deploy-secrets.outputs.enabled == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: Copy binary to server
        if: steps.deploy-secrets.outputs.enabled == 'true'
        run: |
          chmod +x ./bin/server
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ./bin/server \
            $DEPLOY_USER@$DEPLOY_HOST:~/server
      - name: Copy systemd service file
        if: steps.deploy-secrets.outputs.enabled == 'true'
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            deploy/equipo4.service \
            $DEPLOY_USER@$DEPLOY_HOST:/tmp/equipo4.service
      - name: Restart service on server
        if: steps.deploy-secrets.outputs.enabled == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            $DEPLOY_USER@$DEPLOY_HOST "
              sudo mv /tmp/equipo4.service /etc/systemd/system/equipo4.service
              sudo systemctl daemon-reload
              sudo systemctl enable equipo4
              sudo systemctl restart equipo4
              echo 'Deploy exitoso. Estado del servicio:'
              sudo systemctl status equipo4 --no-pager
            "
